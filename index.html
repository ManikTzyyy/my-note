<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Finance</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/tailwind.min.css" />
    <link rel="stylesheet" href="./assets/css/datatables.min.css" />
    <link rel="stylesheet" href="./assets/css/sweetalert2.min.css" />
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body class="relative" id="body">
    <div
      class="flex z-10 bg-opacity-50 gap-2 justify-center fixed bottom-0 w-full py-3 bg-gray-100 rounded-t-3xl text-xs"
    >
      <button
        class="bg-white flex items-center justify-center px-3 py-1 rounded-full gap-2 text-blue-800 border"
        id="btn-trf"
      >
        Trf
        <i data-lucide="arrow-right-left" class="w-3 h-3"></i>
      </button>
      <button
        class="bg-white border flex items-center justify-center px-3 py-1 rounded-full gap-2 text-green-800"
        id="btn-inc"
      >
        Inc
        <i data-lucide="banknote-arrow-up" class="w-3 h-3"></i>
      </button>
      <button
        class="bg-white border flex items-center justify-center px-3 py-1 rounded-full gap-2 text-red-800"
        id="btn-expense"
      >
        Exp
        <i data-lucide="banknote-arrow-down" class="w-3 h-3"></i>
      </button>
    </div>

    <div
      class="fixed z-10 w-screen nav flex justify-between items-center bg-white p-5 drop-shadow-sm filter"
    >
      <div class="absolute bottom-0" id="particles-js"></div>
      <div class="">
        <div class="">
          <p class="text-xs text-gray-500">assets</p>
          <p id="ttl-assets">IDR 0</p>
        </div>
        <p class="text-sm whitespace-nowrap" id="dateNow"></p>
      </div>

      <button
        class="bg-blue-100 rounded-full drop-shadow-lg w-10 h-10 z-10 flex justify-center items-center text-blue-900"
        id="refresh-btn"
      >
        <i data-lucide="refresh-ccw"></i>
      </button>
    </div>
    <br /><br /><br /> <br>

    <!-- content -->
    <div class="p-5">
      <!-- account section -->
      <div class="">
        <div class="flex justify-between items-center border-b pb-2">
          <div class="flex gap-3 items-center">
            <div
              class="bg-blue-50 w-9 h-9 flex justify-center items-center rounded-full text-blue-900"
            >
              <i data-lucide="credit-card"></i>
            </div>
            <h1>Accounts</h1>
          </div>
          <button id="btn-add-acc"><i data-lucide="plus"></i></button>
        </div>
        <!-- content -->
        <div
          class="flex flex-wrap gap-3 py-2 items-center justify-center"
          id="container-accounts"
        ></div>
      </div>
      <!-- End account section -->

      <!-- transaction section -->
      <div class="">
        <div class="flex justify-between items-center border-b pb-2">
          <div class="flex gap-3 items-center">
            <div
              class="bg-yellow-50 w-9 h-9 flex justify-center items-center rounded-full text-yellow-900"
            >
              <i data-lucide="arrow-down-up"></i>
            </div>
            <h1>Transactions</h1>
          </div>
        </div>
        <!-- content -->
        <div class="">
          <table id="tableTrans" class="display stripe">
            <thead>
              <tr class="text-xs font-thin">
                <th>Date</th>
                <th>Descriptions</th>
                <th>Status</th>
                <th>From</th>
                <th>To</th>
                <th>Amount</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="trc-body"></tbody>
          </table>
        </div>
      </div>
      <!-- End transaction section -->
    </div>

    <!-- Pop up -->

    <div
      class="fixed inset-0 w-full h-full bg-black bg-opacity-25 flex justify-center z-50 items-center hidden"
      id="acc-popup"
    >
      <div class="box w-full h-auto rounded-sm bg-white p-2 m-2" id="popBox">
        <div class="flex justify-between border-b mb-2 py-2">
          <div class="text-sm">Add New Account</div>
          <button id="close-pop-up"><i data-lucide="x"></i></button>
        </div>

        <div class="flex w-full justify-between items-start">
          <div class="text-xs flex flex-col mb-2 w-full">
            <label for="name">Select Icon</label>
            <div class="relative">
              <button
                id="select-icon"
                class="bg-blue-100 h-10 w-10 flex justify-center items-center rounded-lg hover:bg-blue-200 text-blue-900"
                data-icon="SmilePlus"
                data-bgclr="bg-blue-100"
                data-txtclr="bg-blue-900"
              >
                <i data-lucide="smile-plus"></i>
              </button>

              <div
                id="icon-box"
                class="hidden box-icon border-blue-100 p-2 border mt-2 rounded-lg absolute bg-white w-full"
              >
                <input
                  type="search"
                  name="search"
                  id="icon-search"
                  placeholder="search icon"
                  class="border px-2 py-1 rounded-lg focus:outline-none text-sm w-full"
                />
                <div
                  id="container-icon"
                  class="flex flex-wrap pt-2 gap-3 text-blue-900 items-center justify-start max-h-32 overflow-x-scroll"
                ></div>
              </div>
            </div>
          </div>

          <div class="flex gap-4">
            <div>
              <p class="text-xs mb-1">Background</p>
              <div id="bgPicker" class="flex flex-wrap gap-2"></div>
            </div>

            <div>
              <p class="text-xs mb-1">Color</p>
              <div id="textPicker" class="flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>

        <div class="text-xs flex flex-col mb-2">
          <label for="name">Account Name</label>
          <input
            class="border px-2 py-1 rounded-sm focus:outline-none text-sm"
            type="text"
            name="name"
            id="acc-name"
            placeholder="ex. acumalaka"
          />
        </div>

        <div class="text-xs flex flex-col mb-2">
          <label for="balance">Start Balance</label>
          <input
            class="border px-2 py-1 rounded-sm focus:outline-none text-sm"
            type="text"
            name="name"
            id="acc-start"
            value="0"
          />
        </div>

        <div class="flex justify-end">
          <button
            class="bg-green-100 px-4 py-1 rounded-full text-green-900 hover:bg-green-300"
            id="btn-save-acc"
          >
            save
          </button>
        </div>
      </div>
    </div>

    <!-- transaction pop up -->
    <div
      class="fixed inset-0 w-full h-full bg-black bg-opacity-25 flex justify-center z-50 items-center hidden"
      id="trc-popup"
    >
      <div class="box w-full h-auto rounded-sm bg-white p-2 m-2" id="popBox">
        <div class="flex justify-between border-b mb-2 py-2">
          <div
            class="text-sm flex gap-4 justify-center items-center"
            id="statusPopup"
          ></div>
          <button id="close-pop-up-trc"><i data-lucide="x"></i></button>
        </div>

        <div class="text-xs flex flex-col mb-2">
          <label for="date">Date</label>
          <input
            class="border px-2 py-1 rounded-sm focus:outline-none text-sm"
            type="date"
            name="date"
            id="trnc-date"
            placeholder="ex. acumalaka"
          />
        </div>

        <div class="text-xs flex flex-col mb-2">
          <label for="desc">Descriptions</label>
          <input
            class="border px-2 py-1 rounded-sm focus:outline-none text-sm"
            type="text"
            name="desc"
            id="trnc-desc"
            placeholder="ex. acumalaka"
          />
        </div>

        <div class="text-xs flex flex-col mb-2">
          <label for="value">value</label>
          <input
            class="border px-2 py-1 rounded-sm focus:outline-none text-sm"
            type="text"
            name="value"
            id="trc-value"
            value="0"
          />
        </div>

        <div id="acc-ref-inp"></div>

        <div class="flex justify-end">
          <button
            class="bg-green-100 px-4 py-1 rounded-full text-green-900 hover:bg-green-300"
            id="btn-save-trc"
          >
            save
          </button>
        </div>
      </div>
    </div>

    <script src="./lib/datatables.min.js"></script>
    <script src="./lib/lucide.min.js"></script>
    <script src="./lib/particles.min.js"></script>
    <script type="module" src="./main.js"></script>
    <script src="./utils/helper.js"></script>
    <script type="module" src="./utils/account.js"></script>
    <script type="module" src="./utils/transaction.js"></script>
    <script src="./lib/sweetalert2.all.min.js"></script>
  </body>
</html>
